<!DOCTYPE html>
<html>

<head>
    <title>Take Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .video-container {
            text-align: center;
            margin-top: 20px;
        }

        img {
            border: 5px solid #333;
            border-radius: 10px;
            max-width: 100%;
        }

        .status-box {
            margin-top: 20px;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="video-container">
            <h2 class="mb-4">Live Attendance Monitor</h2>
            <img src="{{ url_for('video_feed') }}" class="img-fluid" alt="Live Feed">
            <div class="status-box">
                <p>Mode: <span id="mode-badge" class="badge bg-secondary">AUTO</span></p>
                <div class="btn-group mb-3" role="group">
                    <button type="button" class="btn btn-outline-success btn-lg" onclick="setMode('IN')">Check
                        IN</button>
                    <button type="button" class="btn btn-outline-danger btn-lg" onclick="setMode('OUT')">Check
                        OUT</button>
                </div>
                <br>
                <a href="/" class="btn btn-danger">Stop / Back to Home</a>
            </div>

            <script>
                function setMode(mode) {
                    fetch('/set_mode/' + mode)
                        .then(response => {
                            let badge = document.getElementById('mode-badge');
                            badge.innerText = "FORCE " + mode;
                            if (mode === 'IN') {
                                badge.className = "badge bg-success";
                            } else {
                                badge.className = "badge bg-danger";
                            }
                        });
                }
            </script>
            <div class="alert alert-info mt-3">
                <strong>Instructions:</strong> Look at the camera. If enabled, blink to verify liveness.
            </div>
        </div>
    </div>
</body>

</html>
