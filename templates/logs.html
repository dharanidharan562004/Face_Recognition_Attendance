<!DOCTYPE html>
<html>

<head>
    <title>Attendance Logs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Daily Attendance Logs</h2>
            <a href="/" class="btn btn-secondary">Back to Home</a>
        </div>

        <div class="card p-3">
            <table class="table table-bordered table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Roll Number</th>
                        <th>Status</th>
                        <th>Time</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for log in logs %}
                    <tr>
                        <td>{{ log[1] }}</td>
                        <td>{{ log[2] }}</td>
                        <td>
                            {% if log[4] == 'IN' %}
                            <span class="badge bg-success">CHECK IN</span>
                            {% else %}
                            <span class="badge bg-danger">CHECK OUT</span>
                            {% endif %}
                        </td>
                        <td>{{ log[3] }}</td>
                        <td>
                        <td>
                            <button class="btn btn-sm btn-danger"
                                onclick="confirmLogDelete('{{ log[0] }}')">Delete</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    <!-- Admin Auth Modal -->
    <div class="modal fade" id="deleteLogModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form action="/delete_log" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title">Admin Authentication Required</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p>Are you sure you want to delete this log entry?</p>
                        <input type="hidden" name="log_id" id="modal_log_id">
                        <div class="mb-3">
                            <label>Admin Username</label>
                            <input type="text" name="admin_user" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Admin Password</label>
                            <input type="password" name="admin_pass" class="form-control" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-danger">Confirm Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function confirmLogDelete(logId) {
            document.getElementById('modal_log_id').value = logId;
            var myModal = new bootstrap.Modal(document.getElementById('deleteLogModal'));
            myModal.show();
        }
    </script>
</body>

</html>
