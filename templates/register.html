<!DOCTYPE html>
<html>

<head>
    <title>Register Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Register New Student</h2>
            <a href="/" class="btn btn-secondary">Back to Home</a>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card p-4 bg-light h-100">
                    <form action="/register_student" method="post">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Roll Number</label>
                            <input type="text" name="roll_number" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Gmail Address</label>
                            <input type="email" name="email" class="form-control" placeholder="student@gmail.com"
                                required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Save & Capture Face</button>
                        <p class="text-muted mt-3 small">
                            <i class="bi bi-info-circle"></i> After clicking save, look at the camera to capture your
                            face encoding.
                        </p>
                    </form>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card h-100">
                    <div class="card-header bg-dark text-white">Live Camera Preview</div>
                    <div class="card-body p-0">
                        <img src="{{ url_for('video_feed') }}" width="100%" height="100%"
                            style="object-fit: cover; min-height: 300px;">
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
